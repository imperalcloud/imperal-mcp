name: Publish to PyPI

# Publishes on a version tag (v*) using the account PyPI API token stored as the
# GitHub Actions secret PYPI_API_TOKEN (our standard publish credential for
# Imperal PyPI packages — promote it to an org-level secret to share across repos).
on:
  push:
    tags:
      - "v*"

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Publish to PyPI (API token)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
